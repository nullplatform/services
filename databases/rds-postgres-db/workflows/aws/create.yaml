steps:
  - name: build context
    type: script
    file: $SERVICE_PATH/scripts/aws/build_context
    output:
      - name: TFSTATE_BUCKET
        type: environment
      - name: OUTPUT_DIR
        type: environment
      - name: SERVER_HOSTNAME
        type: environment
      - name: SERVER_PORT
        type: environment
      - name: SERVER_MASTER_SECRET_ARN
        type: environment
      - name: DB_NAME
        type: environment
      - name: DB_USERNAME
        type: environment

  - name: build db setup context
    type: script
    file: $SERVICE_PATH/scripts/aws/build_db_setup_context
    output:
      - name: OUTPUT_DIR
        type: environment
      - name: TOFU_MODULE_DIR
        type: environment
      - name: TOFU_INIT_VARIABLES
        type: environment
      - name: TOFU_VARIABLES
        type: environment
      - name: TOFU_IMPORT_DB_NAME
        type: environment
      - name: SETUP_SKIPPED
        type: environment

  - name: tofu
    type: script
    file: $SERVICE_PATH/scripts/aws/do_tofu
    configuration:
      TOFU_ACTION: apply

  - name: write service outputs
    type: script
    file: $SERVICE_PATH/scripts/aws/write_service_outputs
