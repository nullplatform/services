steps:
  - name: build context
    type: script
    file: $SERVICE_PATH/scripts/azure/build_context
    output:
      - name: OUTPUT_DIR
        type: environment
      - name: TOFU_MODULE_DIR
        type: environment
      - name: TOFU_INIT_VARIABLES
        type: environment
      - name: TOFU_VARIABLES

  - name: tofu
    type: script
    file: $SERVICE_PATH/scripts/azure/do_tofu
    configuration:
      TOFU_ACTION: apply

  - name: write service outputs
    type: script
    file: $SERVICE_PATH/scripts/azure/write_service_outputs
