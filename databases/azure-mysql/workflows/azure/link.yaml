steps:
  - name: build context
    type: script
    file: $SERVICE_PATH/scripts/azure/build_context
    output:
      - name: OUTPUT_DIR
        type: environment
      - name: TOFU_MODULE_DIR
        type: environment
      - name: TOFU_INIT_VARIABLES
        type: environment
      - name: TOFU_VARIABLES
      - name: LINK_ID
        type: environment
      - name: LINK_NAME
        type: environment
      - name: SCOPE_ID
        type: environment
      - name: SCOPE_NRN
        type: environment
      - name: SUBSCRIPTION_ID
        type: environment
      - name: RESOURCE_GROUP
        type: environment
      - name: MYSQL_HOST
        type: environment
      - name: MYSQL_PORT
        type: environment
      - name: ADMINISTRATOR_LOGIN
        type: environment
      - name: ADMIN_PASSWORD_SECRET_ID
        type: environment
      - name: LINK_DB_NAME
        type: environment
      - name: LINK_ACCESS_LEVEL
        type: environment

  - name: build permissions context
    type: script
    file: $SERVICE_PATH/scripts/azure/build_permissions_context
    output:
      - name: OUTPUT_DIR
        type: environment
      - name: TOFU_MODULE_DIR
        type: environment
      - name: TOFU_INIT_VARIABLES
        type: environment
      - name: TOFU_VARIABLES

  - name: tofu
    type: script
    file: $SERVICE_PATH/scripts/azure/do_tofu
    configuration:
      TOFU_ACTION: apply

  - name: write link outputs
    type: script
    file: $SERVICE_PATH/scripts/azure/write_link_outputs
