steps:
  - name: "find k8s namespace"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_provider_data"
    output:
      - name: K8S_NAMESPACE
        type: environment
  - name: "build context"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_link_context"
    output:
      - name: SERVICE_ID
        type: environment
      - name: SERVICE_SLUG
        type: environment
      - name: ACTION_ID
        type: environment
      - name: APPLICATION_ID
        type: environment
      - name: ROUTES_JSON
        type: environment
      - name: SCOPE
        type: environment
      - name: HTTPROUTE_NAME
        type: environment
      - name: K8S_NAMESPACE
        type: environment
      - name: AVP_POLICY_STORE_ID
        type: environment
      - name: AUTH_TYPE
        type: environment
      - name: COGNITO_USER_POOL_ARN
        type: environment
  - name: "build httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_link_httproute"
    output:
      - name: SCOPE_ID
        type: environment
      - name: SCOPE_DOMAIN
        type: environment
      - name: HTTPROUTE_NAME
        type: environment
  - name: "manage link policies"
    type: script
    file: "$SERVICE_PATH/scripts/common/manage_link_policies"
    configuration:
      ACTION: "apply"
  - name: "apply"
    type: script
    file: "$SERVICE_PATH/scripts/common/apply"
    configuration:
      ACTION: apply
      DRY_RUN: false
  - name: "store link results"
    type: script
    file: "$SERVICE_PATH/scripts/np/update_link_results"
