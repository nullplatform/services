steps:
  - name: "find k8s namespace"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_provider_data"
    output:
      - name: K8S_NAMESPACE
        type: environment
      - name: ALB_NAME
        type: environment
  - name: "build context"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_context"
    output:
      - name: SERVICE_ID
        type: environment
      - name: SERVICE_NAME
        type: environment
      - name: ACTION_ID
        type: environment
      - name: ACTION_NAME
        type: environment
      - name: PUBLIC_DOMAIN
        type: environment
      - name: PRIVATE_DOMAIN
        type: environment
      - name: ROUTES_JSON
        type: environment
  - name: "fetch existing public httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_httproute"
    configuration:
      VISIBILITY: "public"
    output:
      - name: HTTPROUTE_FILE_PUBLIC
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
  - name: "fetch existing private httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_httproute"
    configuration:
      VISIBILITY: "private"
      OUTPUT_FILE: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
    output:
      - name: HTTPROUTE_FILE_PRIVATE
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
  - name: "update public httproute hostname"
    type: script
    file: "$SERVICE_PATH/scripts/istio/update_httproute_hostname"
    configuration:
      HTTPROUTE_FILE: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
      DOMAIN: "$PUBLIC_DOMAIN"
      GATEWAY: "gateway-public"
  - name: "update private httproute hostname"
    type: script
    file: "$SERVICE_PATH/scripts/istio/update_httproute_hostname"
    configuration:
      HTTPROUTE_FILE: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
      DOMAIN: "$PRIVATE_DOMAIN"
      GATEWAY: "gateway-private"
  - name: "clean public httproute rules"
    type: script
    file: "$SERVICE_PATH/scripts/istio/clean_httproute_rules"
    configuration:
      HTTPROUTE_FILE: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
  - name: "clean private httproute rules"
    type: script
    file: "$SERVICE_PATH/scripts/istio/clean_httproute_rules"
    configuration:
      HTTPROUTE_FILE: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
  - name: "process routes"
    type: script
    file: "$SERVICE_PATH/scripts/istio/process_routes"
    output:
      - name: HTTPROUTE_FILE_PUBLIC
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
      - name: HTTPROUTE_FILE_PRIVATE
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
  - name: "update public dns endpoint"
    type: script
    file: "$SERVICE_PATH/scripts/dns/build_dns"
    configuration:
      VISIBILITY: "public"
    output:
      - name: DNS_FILE_PUBLIC
        type: file
        file: "$OUTPUT_DIR/dnsendpoint-$SERVICE_ID-public.yaml"
  - name: "update private dns endpoint"
    type: script
    file: "$SERVICE_PATH/scripts/dns/build_dns"
    configuration:
      VISIBILITY: "private"
    output:
      - name: DNS_FILE_PRIVATE
        type: file
        file: "$OUTPUT_DIR/dnsendpoint-$SERVICE_ID-private.yaml"
  - name: apply
    type: script
    file: "$SERVICE_PATH/scripts/istio/apply"
    configuration:
      ACTION: apply
      DRY_RUN: false
