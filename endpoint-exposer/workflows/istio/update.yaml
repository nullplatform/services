include:
  - "$SERVICE_PATH/workflows/istio/create.yaml"
steps:
  - name: "manage policies"
    type: script
    file: "$SERVICE_PATH/scripts/common/manage_policies"
    configuration:
      ACTION: "sync"
  - name: apply
    configuration:
      ACTION: apply
      DRY_RUN: false
  - name: "store service results"
    type: script
    file: "$SERVICE_PATH/scripts/np/update_service_results"
