steps:
  - name: "find k8s namespace"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_provider_data"
    output:
      - name: K8S_NAMESPACE
        type: environment
      - name: ALB_NAME
        type: environment
  - name: "build context"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_context"
    output:
      - name: SERVICE_ID
        type: environment
      - name: SERVICE_NAME
        type: environment
      - name: ACTION_ID
        type: environment
      - name: ACTION_NAME
        type: environment
      - name: PUBLIC_DOMAIN
        type: environment
      - name: ROUTES_JSON
        type: environment
  - name: "fetch existing httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_httproute"
    output:
      - name: HTTPROUTE_FILE
        type: environment
  - name: "update httproute hostname"
    type: script
    file: "$SERVICE_PATH/scripts/istio/update_httproute_hostname"
    configuration:
      DOMAIN: "$PUBLIC_DOMAIN"
      GATEWAY: "gateway-public"
  - name: "clean httproute rules"
    type: script
    file: "$SERVICE_PATH/scripts/istio/clean_httproute_rules"
  - name: "process routes"
    type: script
    file: "$SERVICE_PATH/scripts/istio/process_routes"
    output:
      - name: HTTPROUTE_FILE
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
  - name: "generate authorization policy"
    type: script
    file: "$SERVICE_PATH/plugins/authorization-policy/generate"
    configuration:
      TEMPLATE: "$SERVICE_PATH/plugins/authorization-policy/template.yaml.tpl"
    output:
      - name: AUTHZ_POLICY_FILE
        type: file
        file: "$OUTPUT_DIR/authorization-policy-$SERVICE_ID.yaml"
  - name: apply
    type: script
    file: "$SERVICE_PATH/scripts/common/apply"
    configuration:
      ACTION: apply
      DRY_RUN: false
