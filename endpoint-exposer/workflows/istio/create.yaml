steps:
  - name: "find k8s namespace"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_provider_data"
    output:
      - name: K8S_NAMESPACE
        type: environment
      - name: ALB_NAME
        type: environment
  - name: "build context"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_context"
    output:
      - name: SERVICE_ID
        type: environment
      - name: SERVICE_NAME
        type: environment
      - name: ACTION_ID
        type: environment
      - name: ACTION_NAME
        type: environment
      - name: PUBLIC_DOMAIN
        type: environment
      - name: INTERNAL_DOMAIN
        type: environment
      - name: ROUTES_JSON
        type: environment
  - name: "build public httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_ingress"
    configuration:
      TEMPLATE: "$SERVICE_PATH/templates/istio/empty.yaml.tpl"
    output:
      - name: HTTPROUTE_FILE_PUBLIC
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
  - name: "build internal httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_ingress"
    configuration:
      TEMPLATE: "$SERVICE_PATH/templates/istio/empty-internal.yaml.tpl"
    output:
      - name: HTTPROUTE_FILE_INTERNAL
        type: environment
  - name: "process routes"
    type: script
    file: "$SERVICE_PATH/scripts/istio/process_routes"
    output:
      - name: HTTPROUTE_FILE_PUBLIC
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
      - name: HTTPROUTE_FILE_INTERNAL
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-internal.yaml"
  - name: apply
    type: script
    file: "$SERVICE_PATH/scripts/common/apply"
    configuration:
      ACTION: apply
      DRY_RUN: false