steps:
  - name: "find k8s namespace"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_provider_data"
    output:
      - name: K8S_NAMESPACE
        type: environment
      - name: ALB_NAME
        type: environment
  - name: "build context"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_context"
    output:
      - name: SERVICE_ID
        type: environment
      - name: SERVICE_NAME
        type: environment
      - name: ACTION_ID
        type: environment
      - name: ACTION_NAME
        type: environment
      - name: PUBLIC_DOMAIN
        type: environment
      - name: PRIVATE_DOMAIN
        type: environment
      - name: ROUTES_JSON
        type: environment
  - name: "build public httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_ingress"
    configuration:
      TEMPLATE: "$SERVICE_PATH/templates/istio/empty.yaml.tpl"
    output:
      - name: HTTPROUTE_FILE_PUBLIC
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
  - name: "build private httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_ingress"
    configuration:
      TEMPLATE: "$SERVICE_PATH/templates/istio/empty-private.yaml.tpl"
      OUTPUT_FILE: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
    output:
      - name: HTTPROUTE_FILE_PRIVATE
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
  - name: "process routes"
    type: script
    file: "$SERVICE_PATH/scripts/istio/process_routes"
    output:
      - name: HTTPROUTE_FILE_PUBLIC
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
      - name: HTTPROUTE_FILE_PRIVATE
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
  - name: "build dns endpoint"
    type: script
    file: "$SERVICE_PATH/scripts/dns/build_dns"
    output:
      - name: DNS_FILE
        type: file
        file: "$OUTPUT_DIR/dnsendpoint-$SERVICE_ID-public.yaml"
  - name: apply
    type: script
    file: "$SERVICE_PATH/scripts/istio/apply"
    configuration:
      ACTION: apply
      DRY_RUN: false