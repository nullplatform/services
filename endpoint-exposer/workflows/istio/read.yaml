steps:
  - name: "build context"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_context"
    output:
      - name: SERVICE_ID
        type: environment
      - name: SERVICE_SLUG
        type: environment
      - name: ACTION_ID
        type: environment
      - name: ACTION_NAME
        type: environment
      - name: APPLICATION_ID
        type: environment
  - name: "read avp policies"
    type: script
    file: "$SERVICE_PATH/scripts/avp/read_policies"
