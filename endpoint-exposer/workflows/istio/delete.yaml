include:
  - "$SERVICE_PATH/workflows/istio/create.yaml"
steps:
  - name: "manage avp policies"
    type: script
    file: "$SERVICE_PATH/scripts/avp/delete_policies"
  - name: apply
    configuration:
      ACTION: delete
  - name: "delete avp policy store"
    type: script
    file: "$SERVICE_PATH/scripts/avp/delete_policy_store"
    configuration:
      DELETE_POLICY_STORE: "true"