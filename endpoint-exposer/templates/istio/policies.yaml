apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: example-service-00000000-0000-0000-0000-000000000005-authz
  namespace: nullplatform
  labels:
    app.kubernetes.io/name: example-service
    nullplatform.com/service-id: "00000000-0000-0000-0000-000000000005"
    nullplatform.com/managed-by: endpoint-exposer
spec:
  selector:
    matchLabels:
      nullplatform: "true"
  action: CUSTOM
  provider:
    name: opa-ext-authz
  rules:
  # Aplicar OPA solo a /api/config
  - to:
    - operation:
        hosts:
          - api.example.nullimplementation.com
        methods:
          - GET
        paths:
          - /api/config
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: example-service-leaderboard-allow
  namespace: nullplatform
  labels:
    app.kubernetes.io/name: example-service
    nullplatform.com/managed-by: endpoint-exposer
spec:
  selector:
    matchLabels:
      nullplatform: "true"
  action: ALLOW
  rules:
  # Permitir /api/leaderboard sin validación
  - to:
    - operation:
        hosts:
          - api.example.nullimplementation.com
        methods:
          - GET
        paths:
          - /api/leaderboard